name: Selenium Automation Tests

# This tells GitHub WHEN to run the tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This tells GitHub WHAT to do
jobs:
  test-execution:
    # This spins up a temporary Linux server
    runs-on: ubuntu-latest

    steps:
    # 1. Download your framework code onto the Linux server
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install Java 1.8
    - name: Set up JDK 1.8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven # This caches your dependencies so future runs are faster

    # 3. Execute the Maven command (Defaults to master.xml based on your pom.xml)
    - name: Run Tests with Maven
      run: mvn clean test


    # 4. Save the Extent Reports so you can download them!
    - name: Upload Extent Reports
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: Automation-Extent-Reports
        path: reports/  
